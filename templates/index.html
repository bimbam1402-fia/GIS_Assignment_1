<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Flask Assignment</title>

    <!-- DonutCluster -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-donutcluster/dist/leaflet.donutcluster.css">

    <!-- MarkerCluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

        <!-- Turf -->
         <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
         <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>


    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

   
    
 
</head>
<body>

    <!-- Burger menu button -->
    <button id="menu-toggle" class="burger-btn">☰ Tasks</button>

    <!-- Side menu -->
    <div id="side-menu" class="side-menu hidden">
        <h3>Assignment Tasks</h3>

        <!-- Task 1 -->
        <button class="task-btn" onclick="toggleSubmenu('task1-submenu')">Task 1</button>
        <div id="task1-submenu" class="submenu hidden">
            <button onclick="addPoint()">Add Point</button>
            <button onclick="addLine()">Add Line</button>
            <button onclick="addPolygon()">Add Polygon</button>
            <button onclick="clearMap()">Clear Features</button>
        </div>

        <!-- Task 2 -->
        <button class="task-btn" onclick="toggleSubmenu('task2-submenu')">Task 2</button>
        <div id="task2-submenu" class="submenu hidden">
            <button onclick="showTask2Locations()">Show 5 Locations</button>
            <button onclick="clearTask2Locations()">Clear Task 2</button>
        </div>

        <!-- Task 3 -->
        <button class="task-btn" onclick="toggleSubmenu('task3-submenu')">Task 3</button>
        <div id="task3-submenu" class="submenu hidden">
            <button onclick="showTask3()">Load Supermarkets</button>
            <button onclick="clearTask3()">Clear Task 3</button>
        </div>
        <!-- Task 4 -->
        <button class="task-btn" onclick="toggleSubmenu('task4-submenu')">Task 4</button>
        <div id="task4-submenu" class="submenu hidden">
            <button onclick="showTask4()">Load overlay</button>
            <button onclick="clearTask4()">Clear Task 4</button>
        </div>
        <!-- Task 5 -->
        <button class="task-btn" onclick="toggleSubmenu('task5-submenu')">Task 5</button>
        <div id="task5-submenu" class="submenu hidden">
            <button onclick="loadFuelCluster()">Marker Cluster Fuel Stations</button>
            <button onclick="loadFuelDonut()">Donut Cluster Fuel Stations</button>
            <button onclick="clearFuel()">Clear Clusters</button>
        </div>
        <!-- Task 6 -->
        <button class="task-btn" onclick="toggleSubmenu('task6-submenu')">Task 6</button>
        <div id="task6-submenu" class="submenu hidden">
        <button onclick="loadWeather()">Load Weather</button>
        <button onclick="clearWeather()">Clear Weather</button>
        </div> 

        <!-- Task 7 -->
        <button class="task-btn" onclick="toggleSubmenu('task7-submenu')">Task 7</button>
        <div id="task7-submenu" class="submenu hidden">
            <button onclick="showSchoolClusters()">Show School Clusters</button>
            <button onclick="clearSchoolClusters()">Clear Clusters</button>
        </div>

        <!-- Task 8 -->
        <button class="task-btn" onclick="toggleSubmenu('task8-submenu')">Task 8</button>
        <div id="task8-submenu" class="submenu hidden">
            <button class="run-btn" onclick="solveTask8()">Analyze Population</button>
            <button class="clear-btn" onclick="clearTask8()">Clear Task 8</button>
        </div>
    </div>

    <!-- Keep ONLY this one -->
    <div id="info-sidebar" class="info-sidebar hidden">
        <button id="close-sidebar" onclick="closesidebar()">X</button>
        <h3>Location Info</h3>
        <p>Click a Task 2 location marker to see details here.</p>
    </div>

    <div id="map"></div>

    
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-donutcluster/dist/leaflet.donutcluster.js"></script>

   <!--  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script> -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
